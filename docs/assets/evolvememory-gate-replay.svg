<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-label="EvolveMemory adaptive replay metrics">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10243a"/>
      <stop offset="100%" stop-color="#173b40"/>
    </linearGradient>
    <style>
      .title{font:800 22px 'Avenir Next','Trebuchet MS',sans-serif;fill:#e7f7ff}
      .label{font:800 13px 'Avenir Next','Trebuchet MS',sans-serif;fill:#9fd8e9;text-transform:uppercase;letter-spacing:.08em}
      .mono{font:500 17px 'SFMono-Regular','Menlo','Consolas',monospace;fill:#eefbff}
      .small{font:500 15px 'SFMono-Regular','Menlo','Consolas',monospace;fill:#eefbff}
      .muted{fill:#a9c9d2}
      .ok{fill:#9af0c4}
      .warn{fill:#ffd58a}
      .block{fill:#ff9e8f}
      .panel{fill:#0e2c36;stroke:#3b6974;stroke-width:1}
      .metric{font:800 28px Georgia,'Times New Roman',serif;fill:#f7fbff}
    </style>
  </defs>
  <rect width="1180" height="720" rx="34" fill="#eef6f6"/>
  <rect x="42" y="42" width="1096" height="636" rx="24" fill="url(#bg)" stroke="#9dcbd2"/>
  <text x="76" y="88" class="title">EvolveMemory replay: retrieval is not permission</text>
  <text x="76" y="134" class="mono warn">$ python -m memory_system.demo</text>
  <text x="76" y="174" class="mono ok">status: PASS</text>
  <text x="76" y="206" class="mono muted">active_memories_before_correction: 7 · accepted_candidates: 4/4 · gate_eval: 8/8</text>

  <rect x="76" y="248" width="314" height="118" rx="18" class="panel"/>
  <text x="100" y="280" class="label">Gate Accuracy</text>
  <text x="100" y="318" class="metric">8 / 8</text>
  <text x="100" y="346" class="small muted">expected actions matched</text>

  <rect x="432" y="248" width="314" height="118" rx="18" class="panel"/>
  <text x="456" y="280" class="label">No-Mention Query</text>
  <text x="456" y="318" class="metric">suppress</text>
  <text x="456" y="346" class="small muted">life_event blocked</text>

  <rect x="790" y="248" width="274" height="118" rx="18" class="panel"/>
  <text x="814" y="280" class="label">Correction</text>
  <text x="814" y="318" class="metric">2 / 2</text>
  <text x="814" y="346" class="small muted">state + profile retired</text>

  <text x="76" y="420" class="label">Query A: 面试怎么准备？</text>
  <text x="98" y="456" class="small ok">life_event -> follow_up</text>
  <text x="98" y="486" class="small ok">communication_style -> style_only</text>
  <text x="98" y="516" class="small warn">current_emotional_state -> policy-only context</text>

  <text x="602" y="420" class="label">Query B: 今天只帮我 review Python 代码，不用提面试。</text>
  <text x="624" y="456" class="small block">life_event -> suppress</text>
  <text x="624" y="486" class="small ok">communication_style -> style_only</text>
  <text x="624" y="516" class="small muted">direct visible memory -> none</text>

  <text x="76" y="594" class="mono muted">Good memory is controlled behavior: write governance, use gate, prompt safety, correction, audit.</text>
</svg>
